<nav
	aria-label="{{ i18n "lang-switch.label" | default "Language" }}"
	class="relative col-span-2 col-start-2 grid grid-cols-3 place-items-center justify-self-center text-[11px] sm:mr-1 sm:justify-self-end md:text-base"
>
	<span class="block">
		<a
			class="{{ if eq .Page.Language.Lang "cs" }}
				font-bold text-strikethrough text-strikethrough--interactive
				text-strikethrough--active
			{{ else }}
				font-normal
			{{ end }} text-strikethrough text-strikethrough--interactive hover:text-neutral-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
			href="{{ range where .Translations "Lang" "cs" }}
				{{ .RelPermalink }}
			{{ end }}"
			{{ if eq .Page.Language.Lang "cs" }}aria-current="page"{{ end }}
		>
			CZ
		</a>
	</span>
	<span class="h-[13px] w-px bg-neutral-800 md:h-[19px]"></span>
	<span class="block">
		{{ if not (where .AllTranslations "Language.Lang" "cs") }}
			<span class="cursor-not-allowed">EN</span>
		{{ else }}
			<a
				class="{{ if eq .Page.Language.Lang "en" }}
					font-bold text-strikethrough text-strikethrough--interactive
					text-strikethrough--active
				{{ else }}
					font-normal
				{{ end }} text-strikethrough text-strikethrough--interactive focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
				href="{{ range where .Translations "Lang" "en" }}
					{{ .RelPermalink }}
				{{ end }}"
				{{ if eq .Page.Language.Lang "en" }}aria-current="page"{{ end }}
			>
				EN
			</a>
		{{ end }}
	</span>
</nav>
