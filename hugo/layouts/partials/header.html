<header
	class="fixed inset-x-0 top-[20px] z-[1000] grid w-full grid-cols-12 place-items-start"
>
	<nav class="col-start-5 col-end-12 ml-1 sm:col-end-11" aria-label="Main navigation">
		<ul
			class="flex gap-4 text-base font-semibold text-neutral-800 md:gap-10 md:text-2xl"
		>
			{{ range .Site.Menus.main }}
				{{ if ne .Params.hidden "true" }}
					<li>
						<a
							class="link-strikethrough {{ if eq $.Page.RelPermalink .URL }}link-strikethrough--active{{ end }} whitespace-nowrap"
							href="{{ .URL }}"
							{{ if eq $.Page.RelPermalink .URL }}aria-current="page"{{ end }}
						>
							{{ .Name }}
						</a>
					</li>
				{{ end }}
			{{ end }}
		</ul>
	</nav>
	<div
		class="col-start-12 w-2/3 min-w-[20px] max-w-[56px] place-self-center fill-neutral-800 transition-colors duration-150 hover:fill-accent lg:col-start-11"
	>
		<a href="{{ ($.Site.GetPage `/`).RelPermalink }}" aria-label="Home" class="focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent">
			{{ partial "svg/Logo.svg" }}
		</a>
	</div>
</header>
