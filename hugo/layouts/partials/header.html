<header
  class="fixed inset-x-0 bottom-0 top-0 z-[1000] grid w-full grid-cols-12 pointer-events-none"
>
  <!-- Nav overlay (frosted backdrop) -->
  <div
    data-nav-overlay
    class="fixed inset-0 bg-white/60 backdrop-blur-xs z-[1099] opacity-0 pointer-events-none flex flex-col items-center select-none"
  >
    <!-- Mobile-only: centered nav inside overlay -->
    <div class="md:hidden flex flex-col h-full w-full items-center">
      <nav
        class="flex-1 flex items-center justify-center"
        aria-label="Mobile navigation"
      >
        <ul class="flex flex-col gap-6 items-center">
          {{ range .Site.Menus.main }}
              <li>
                <a
                  href="{{ .URL }}"
                  class="nav-label-mobile link-strikethrough{{ if eq $.Page.RelPermalink .URL }} link-strikethrough--active{{ end }} text-base font-semibold text-neutral-800 whitespace-nowrap"
                  {{ if eq $.Page.RelPermalink .URL }}aria-current="page"{{ end }}
                >
                  <span class="relative block">{{ .Name }}</span>
                </a>
              </li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </div>

  <!-- How I AI LED button - top center -->
  <div class="col-start-5 col-end-9 self-start flex justify-center pt-5 pointer-events-auto">
    {{ partial "nav/how-i-ai-button.html" . }}
  </div>

  <!-- Nav column - entire trigger zone -->
  <div
    data-nav-toggle
    class="col-start-12 col-end-13 flex flex-col h-full z-[1100] pointer-events-auto select-none"
  >
    <!-- Logo (top) -->
    <div
      data-nav-logo
      class="w-2/3 min-w-[20px] max-w-[56px] place-self-center pt-5 fill-neutral-800 transition-colors duration-150 hover:fill-accent"
    >
      <a
        href="{{ ($.Site.GetPage `/`).RelPermalink }}"
        aria-label="Home"
        class="focus-accent"
      >
        {{ partial "svg/Logo.svg" }}
      </a>
    </div>

    <!-- Navigation (centered) -->
    <nav
      class="flex-1 flex items-center justify-center"
      aria-label="Main navigation"
    >
      <ul class="flex flex-col gap-6 items-center">
        {{ range .Site.Menus.main }}
            <li class="relative flex items-center justify-center">
              <a
                href="{{ .URL }}"
                class="nav-label link-strikethrough{{ if eq $.Page.RelPermalink .URL }} link-strikethrough--active{{ end }} hidden md:inline-block absolute right-full mr-4 text-2xl font-semibold text-neutral-800 whitespace-nowrap"
                {{ if eq $.Page.RelPermalink .URL }}aria-current="page"{{ end }}
              >
                <span class="relative block">{{ .Name }}</span>
              </a>
              <span
                class="nav-dot{{ if eq $.Page.RelPermalink .URL }} nav-dot--active{{ end }}"
              ></span>
            </li>
        {{ end }}
      </ul>
    </nav>

    <!-- Bottom spacer (reserved for future social links) -->
    <div class="pb-5"></div>
  </div>
</header>
